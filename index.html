<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="منصة ربط مرضى زراعة الشعر بالأطباء المعتمدين - Hair Transplant Connect">
  <meta name="theme-color" content="#1a5276">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HTC">
  <title>Hair Transplant Connect | زراعة الشعر</title>
  <link id="fontLink" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="#/" class="logo">
        <div class="logo-icon">🏥</div>
        <span data-t="appName">Hair Transplant Connect</span>
      </a>
      <nav class="nav-links" id="navLinks"></nav>
      <div class="header-actions">
        <span class="user-badge" id="userBadge" style="display:none"></span>
        <button class="notif-bell" id="notifBell" title="إشعارات">
          🔔
          <span class="notif-count" id="notifCount" style="display:none">0</span>
        </button>
        <button class="lang-toggle" id="langToggle">EN / ع</button>
        <button class="install-btn" id="installBtn" style="display:none" data-t="pwa.install">تثبيت التطبيق</button>
        <button class="logout-btn" id="logoutBtn" style="display:none" data-t="nav.logout">تسجيل الخروج</button>
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
      </div>
    </div>
  </header>

  <!-- Main App -->
  <main id="app"></main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-ad" data-t="ad">إعلان</div>
      <div class="footer-links">
        <a href="privacy.html" data-t="footer.privacy">سياسة الخصوصية</a>
        <a href="terms.html" data-t="footer.terms">شروط الاستخدام</a>
      </div>
      <p>© 2026 Hair Transplant Connect. <span data-t="footer.rights">جميع الحقوق محفوظة</span></p>
    </div>
  </footer>

  <!-- Modals -->
  <div id="disclaimerModal" style="display:none"></div>
  <div id="cookieBanner" style="display:none"></div>
  <div id="toastContainer"></div>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
  <!-- Scripts -->
  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
