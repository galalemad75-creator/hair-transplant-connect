<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="منصة ربط مرضى زراعة الشعر بالأطباء المعتمدين">
  <meta name="theme-color" content="#1a5276">
  <title>Hair Transplant Connect | زراعة الشعر</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <style>
    /* Inline critical CSS + font fallback — no external CDN needed */
    body { font-family: 'Segoe UI', Tahoma, Arial, 'Noto Sans Arabic', sans-serif; }
  </style>
</head>
<body>
  <!-- Header (visible even without JS) -->
  <header class="header">
    <div class="header-inner">
      <a href="#/" class="logo">
        <div class="logo-icon">🏥</div>
        <span>Hair Transplant Connect</span>
      </a>
      <nav class="nav-links" id="navLinks">
        <a href="#/">الرئيسية</a>
        <a href="#/login">تسجيل الدخول</a>
      </nav>
      <div class="header-actions">
        <span class="user-badge" id="userBadge" style="display:none"></span>
        <button class="notif-bell" id="notifBell" title="إشعارات">🔔<span class="notif-count" id="notifCount" style="display:none">0</span></button>
        <button class="lang-toggle" id="langToggle">EN / ع</button>
        <button class="logout-btn" id="logoutBtn" style="display:none">تسجيل الخروج</button>
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
      </div>
    </div>
  </header>

  <!-- Main App -->
  <main id="app">
    <!-- Fallback content (shows if JS fails) -->
    <section class="hero" style="padding:80px 0;text-align:center;color:#fff;background:linear-gradient(135deg,#0e3652,#1a5276,#2980b9)">
      <div class="container">
        <h1 style="font-size:2.5rem;margin-bottom:15px">ابدأ رحلتك نحو شعر صحي</h1>
        <p style="opacity:0.9;margin-bottom:25px;font-size:1.1rem">منصة موثوقة تربطك بأفضل أطباء زراعة الشعر</p>
        <a href="#/register/patient" class="btn btn-primary btn-lg" style="display:inline-block;padding:14px 32px;background:#2ecc71;color:#fff;border-radius:8px;text-decoration:none;font-weight:700;font-size:1.1rem">ابدأ الآن</a>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-ad" id="footerAd">إعلان</div>
      <div class="footer-links">
        <a href="privacy.html">سياسة الخصوصية</a>
        <a href="terms.html">شروط الاستخدام</a>
      </div>
      <p>© 2026 Hair Transplant Connect. جميع الحقوق محفوظة</p>
    </div>
  </footer>

  <!-- Modals -->
  <div id="disclaimerModal" style="display:none"></div>
  <div id="cookieBanner" style="display:none"></div>
  <div id="toastContainer"></div>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }
  </script>

  <!-- App Scripts -->
  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
