<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بدون اتصال | Hair Transplant Connect</title>
  <link rel="icon" type="image/png" href="icons/icon-96.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', 'Segoe UI', Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #134e4a, #0d9488);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      color: white; text-align: center; padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.1); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px; padding: 48px 32px; max-width: 420px;
    }
    .icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 1.8rem; margin-bottom: 12px; }
    p { opacity: 0.85; font-size: 1rem; line-height: 1.7; margin-bottom: 24px; }
    .btn {
      display: inline-block; padding: 14px 32px;
      background: linear-gradient(135deg, #059669, #10b981);
      color: white; border: none; border-radius: 999px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      text-decoration: none; transition: 0.3s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(5,150,105,0.4); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>يبدو أنك غير متصل بالإنترنت. تحقق من اتصالك وأعد المحاولة.</p>
    <button class="btn" onclick="location.reload()">🔄 إعادة المحاولة</button>
  </div>
</body>
</html>
